name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'helm/**'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
    - name: Set up Go
      uses: actions/setup-go@v2
      with:
        go-version: 1.22
    - name: Build the application        
      run: go build -o my-web-app 
    - name: Run tests
      run: go test ./...
  code-quality:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: v1.56.2
  push:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1
    - name: Log in to Docker Hub
      uses: docker/login-action@v1
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - name: Build and push Docker image
      uses: docker/build-push-action@v2
      with:
        context: ./Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/my-web-app:${{ github.run_id }}
  update-helm-chart:
    runs-on: ubuntu-latest
    needs: push
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
      with:
        token: ${{ secrets.TOKEN}}
    - name: Update Helm chart with new image tag
      run: |
        sed -i "s/tag:.*/tag: ${GITHUB_RUN_ID}/" helm/go-web-app-chart/values.yaml
    - name: Commit and push changes
      run: |
        git config --global user.name "Gnanendra-sairam"
        git config --global user.email "sairam.gutlapalli@gmail.com"
        git add helm/go-web-app-chart/values.yaml
        git commit -m "Update Helm chart with new image tag: ${{ github.run_id }}"
        git push 
